        { key: "nClientes",  syn: ["numero de clientes","n clientes","clientes","numero clientes","qtd clientes","n de clientes"] },
        { key: "demInst",    syn: ["demanda instalada transformador","demanda instalada","demanda instalada do transformador","dem instalada"] },
        { key: "potTrafo",   syn: ["potencia transformador","potencia do transformador","potencia trafo","potencia","kva trafo"] },
        { key: "resultado",  syn: ["resultado simulacao","resultado da simulacao","resultado","simulacao"] },
        { key: "motivo",     syn: ["motivo","observacao","obs"] },
        { key: "demImpacto", syn: ["demanda de impacto","demanda impacto","dem impacto","impacto"] },
        { key: "novaDemInst",syn: ["nova demanda instalada do transformador","nova demanda instalada","nova dem instalada"] },
        { key: "carreg",     syn: ["carregamento","% carregamento","percentual carregamento"] },
        { key: "novoCarreg", syn: ["novo carregamento","% novo carregamento","novo percentual carregamento","percentual novo carregamento"] },
      ];

      function cmpMapColumns(headerRow) {
        const H = headerRow.map(cmpNorm);
        const map = {};
        const usados = new Set();
        const ordem = [...CMP_COLDEFS].sort((a,b)=> (b.exact?1:0)-(a.exact?1:0));
        for (const def of ordem) {
          let idx = -1;
          for (const s of def.syn) { const i = H.indexOf(cmpNorm(s)); if (i !== -1 && !usados.has(i)) { idx = i; break; } }
          if (idx === -1 && !def.exact) {
            for (const s of def.syn) {
              const ns = cmpNorm(s);
              const i = H.findIndex((h,k) => h && !usados.has(k) && (h.includes(ns) || ns.includes(h)) && h.length > 2);
              if (i !== -1) { idx = i; break; }
            }
          }
          if (idx !== -1) usados.add(idx);
          map[def.key] = idx;
        }
        return map;
      }

      function cmpParseWorkbook(data) {
        const wb = XLSX.read(data, { type: "array" });
        let best = null;
        for (const name of wb.SheetNames) {
          const ws = wb.Sheets[name];
          const arr = XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: false, defval: null });
          if (!arr.length) continue;
          let hdrIdx = -1, hdrScore = -1, hdrMap = null;
          const scan = Math.min(arr.length, 15);
          for (let r = 0; r < scan; r++) {
            const m = cmpMapColumns(arr[r] || []);
            const score = Object.values(m).filter((i) => i !== -1).length;
            if (score > hdrScore) { hdrScore = score; hdrIdx = r; hdrMap = m; }
          }
          if (hdrScore > (best?.hdrScore ?? -1)) best = { name, arr, hdrIdx, hdrScore, hdrMap };
        }
        if (!best || best.hdrScore < 3) {
          throw new Error("Não encontrei as colunas esperadas (Número de clientes, Potência transformador, Demanda de impacto, etc.). Confira o cabeçalho da planilha.");
        }
        const { arr, hdrIdx, hdrMap } = best;
        const rows = [];
        for (let r = hdrIdx + 1; r < arr.length; r++) {
          const raw = arr[r];
          if (!raw || raw.every((c) => c == null || c === "")) continue;
          const get = (k) => (hdrMap[k] !== -1 ? raw[hdrMap[k]] : null);
          const cargaD     = cmpToNum(get("cargaD"));
          const nClientes  = cmpToNum(get("nClientes"));
          const demInst    = cmpToNum(get("demInst"));
          const potTrafo   = cmpToNum(get("potTrafo"));
          const demImpacto = cmpToNum(get("demImpacto"));
          if (potTrafo == null || demInst == null) continue;
          rows.push({
            cargaD,
            nClientes: nClientes ?? 0,
            demInst, potTrafo, demImpacto,
            resultado: get("resultado"),
            motivo: get("motivo"),
            novaDemInst: cmpToNum(get("novaDemInst")),
            carreg: cmpToNum(get("carreg")),
            novoCarreg: cmpToNum(get("novoCarreg")),
          });
        }
        return { sheet: best.name, cols: hdrMap, rows, headerRow: arr[hdrIdx] };
      }

      // Rótulo por potência exata do transformador (ex.: "37,5 kVA")
      function grupoPotencia(p) {
        const n = Number(p);
        const s = n.toLocaleString("pt-BR", { maximumFractionDigits: 2 });
        return s + " kVA";
      }
      // Fase inferida pela potência: monofásico = {5,10,15,25,37,37.5}; senão trifásico
      const POT_MONO = new Set([5, 10, 15, 25, 37, 37.5]);
      function fasePotencia(p) {
        return POT_MONO.has(Number(p)) ? "Monofásico" : "Trifásico";
      }

      function cmpEnrich(row) {
        const D = row.cargaD != null ? row.cargaD : (row.demImpacto ?? 0);
        const r = calcImpacto(D, row.nClientes, "rusck");
        const s = calcImpacto(D, row.nClientes, "sargent");

        const carregAntes = row.demInst / row.potTrafo;
        const novaAntigo   = row.demInst + (row.demImpacto ?? 0);
        const carregAntigo = novaAntigo / row.potTrafo;
        const novaRusck    = row.demInst + r.DD;
        const carregRusck  = novaRusck / row.potTrafo;
        const novaSarg     = row.demInst + s.DD;
        const carregSarg   = novaSarg / row.potTrafo;
        const margemRusck = LIM * row.potTrafo - novaRusck;
        const margemSarg  = LIM * row.potTrafo - novaSarg;

        // Critério único de liberação: carregamento ≤ 150% (para todos os cenários).
        const libAntigo = carregAntigo <= LIM;

        return {
          ...row, D, classe: r.classe,
          impAntigo: row.demImpacto,
          impRusck: r.DD, impSarg: s.DD,
          carregAntes, carregAntigo, carregRusck, carregSarg,
          margemRusck, margemSarg,
          libAntigo,
          libRusck:  carregRusck  <= LIM,
          libSarg:   carregSarg   <= LIM,
          faixa: grupoPotencia(row.potTrafo),
          fase: fasePotencia(row.potTrafo),
          potNum: Number(row.potTrafo),
        };
      }

      const cmpFmt = (v, d=2) => (v==null || isNaN(v)) ? "—" : v.toLocaleString("pt-BR",{minimumFractionDigits:d, maximumFractionDigits:d});
      const cmpPct = (v, d=1) => (v==null || isNaN(v)) ? "—" : (v*100).toLocaleString("pt-BR",{minimumFractionDigits:d, maximumFractionDigits:d})+"%";

      function CmpLibPill({ ok }) {
        return ok
          ? <span className="pill good">✓ Liberado</span>
          : <span className="pill crit">✕ Obra</span>;
      }

      function CmpLegend() {
        return (
          <div className="legend">
            <span className="lg"><span className="sw" style={{background:"var(--s-antigo)"}}></span>Demanda de impacto (planilha / método atual)</span>
            <span className="lg"><span className="sw" style={{background:"var(--s-rusck)"}}></span>Rusck (CEMIG)</span>
            <span className="lg"><span className="sw" style={{background:"var(--s-sarg)"}}></span>Sargent / Heydt</span>
          </div>
        );
      }

      function CmpFaixaBars({ nome, rows }) {
        const avg = (sel) => rows.reduce((a,r)=>a+sel(r),0)/rows.length;
        const cAntes  = avg(r=>r.carregAntes);
        const cAntigo = avg(r=>r.carregAntigo);
        const cRusck  = avg(r=>r.carregRusck);
        const cSarg   = avg(r=>r.carregSarg);
        const maxV = Math.max(cAntes,cAntigo,cRusck,cSarg,LIM) * 1.05;
        const W = (v) => Math.min(100, (v/maxV)*100);
        const limX = (LIM/maxV)*100;
        const Bar = ({label,val,color}) => (
          <div className="barrow">
            <div className="barlabel">{label}</div>
            <div className="bartrack">
              <div className="barfill" style={{width:W(val)+"%", background:color, opacity: val>LIM?1:0.85}}></div>
              <div className="barval mono" style={{left:W(val)+"%"}}>{cmpPct(val,1)}</div>
            </div>
          </div>
        );
        return (
          <div className="card" style={{position:"relative"}}>
            <div className="faixa-hd">{nome} <span className="cnt">· {rows[0]?.fase} · {rows.length} caso{rows.length>1?"s":""} · carregamento médio</span></div>
            <div style={{position:"relative"}}>
              <div style={{position:"absolute", left:"calc(130px + 12px + "+limX+"% * (100% - 142px)/100%)", top:0, bottom:0, width:0, borderLeft:"1px dashed var(--st-crit)", zIndex:2}}></div>
              <Bar label="Antes (base)"  val={cAntes}  color="var(--text-4)" />
              <Bar label="Método atual"  val={cAntigo} color="var(--s-antigo)" />
              <Bar label="Rusck"         val={cRusck}  color="var(--s-rusck)" />
              <Bar label="Sargent/Heydt" val={cSarg}   color="var(--s-sarg)" />
            </div>
            <div className="foot-note"><span style={{color:"var(--st-crit)"}}>┊</span> limite de liberação = 150% de carregamento</div>
          </div>
        );
      }

      function Comparacao() {
        const [state, setState] = useState(null);
        const [err, setErr] = useState(null);
        const [loading, setLoading] = useState(true);
        const [over, setOver] = useState(false);
        const [faixaFiltro, setFaixaFiltro] = useState("__todas__");
        const [faseFiltro, setFaseFiltro] = useState("__todas__");
        const [soRegr, setSoRegr] = useState(false);
        const fileRef = useRef(null);

        const carregarBuffer = (buf, origem) => {
          try {
            const parsed = cmpParseWorkbook(new Uint8Array(buf));
            if (!parsed.rows.length) { setErr("Arquivo lido, mas nenhuma linha de dados válida foi encontrada."); return; }
            setErr(null);
            setState({ ...parsed, origem, enriched: parsed.rows.map(cmpEnrich) });
          } catch (ex) { setErr(ex.message || String(ex)); }
        };

        // Tenta puxar ./arquivo.xlsx da raiz ao montar
        useEffect(() => {
          let vivo = true;
          (async () => {
            try {
              const resp = await fetch(ARQUIVO, { cache: "no-store" });
              if (!resp.ok) throw new Error("HTTP " + resp.status);
              const buf = await resp.arrayBuffer();
              if (vivo) carregarBuffer(buf, "arquivo.xlsx");
            } catch (ex) {
              // Sem arquivo na raiz (ou aberto via file://) → cai no import manual
              if (vivo) setErr(null);
            } finally {
              if (vivo) setLoading(false);
            }
          })();
          return () => { vivo = false; };
        }, []);

        const handleFile = (file) => {
          setErr(null);
          const reader = new FileReader();
          reader.onload = (e) => carregarBuffer(e.target.result, file.name);
          reader.onerror = () => setErr("Falha ao ler o arquivo.");
          reader.readAsArrayBuffer(file);
        };
        const onDrop = (e) => { e.preventDefault(); setOver(false); const f = e.dataTransfer.files[0]; if (f) handleFile(f); };

        const dataAll = state?.enriched || [];
        // Filtro de fase (monofásico/trifásico) escopa todo o relatório
        const data = faseFiltro==="__todas__" ? dataAll : dataAll.filter(r=>r.fase===faseFiltro);
        // Potências presentes, ordenadas pelo valor numérico
        const faixasPresentes = [...new Set(data.map(r=>r.faixa))]
          .sort((a,b)=>{
            const pa = data.find(r=>r.faixa===a)?.potNum ?? 0;
            const pb = data.find(r=>r.faixa===b)?.potNum ?? 0;
            return pa-pb;
          });
        // se a potência selecionada não existe mais na fase atual, ignora o filtro de potência
        const faixaAtiva = faixaFiltro!=="__todas__" && faixasPresentes.includes(faixaFiltro) ? faixaFiltro : "__todas__";
        const visiveis = faixaAtiva==="__todas__" ? data : data.filter(r=>r.faixa===faixaAtiva);

        const kpis = useMemo(() => {
          const base = visiveis;
          if (!base.length) return null;
          const gain = (k) => base.filter(r=>!r.libAntigo &&  r[k]).length;
          const regr = (k) => base.filter(r=> r.libAntigo && !r[k]).length;
          const avg  = (sel) => base.reduce((a,r)=>a+sel(r),0)/base.length;
          const median = (sel) => {
            const v = base.map(sel).filter(x=>x!=null && !isNaN(x)).sort((a,b)=>a-b);
            if (!v.length) return null;
            const m = Math.floor(v.length/2);
            return v.length%2 ? v[m] : (v[m-1]+v[m])/2;
          };
          return {
            n: base.length,
            liberadosA: base.filter(r=>r.libAntigo).length,
            liberadosR: base.filter(r=>r.libRusck).length,
            liberadosS: base.filter(r=>r.libSarg).length,
            regrR: regr("libRusck"), regrS: regr("libSarg"),
            gainR: gain("libRusck"), gainS: gain("libSarg"),
            divergentes: base.filter(r=>r.libRusck !== r.libSarg).length,
            apertadosR: base.filter(r=>r.carregRusck>1.2 && r.carregRusck<=LIM).length,
            apertadosS: base.filter(r=>r.carregSarg >1.2 && r.carregSarg <=LIM).length,
            estouramR: base.filter(r=>r.carregRusck>LIM).length,
            estouramS: base.filter(r=>r.carregSarg >LIM).length,
            carRmed: avg(r=>r.carregRusck), carSmed: avg(r=>r.carregSarg),
            carRmediana: median(r=>r.carregRusck),
          };
        }, [visiveis]);

        const porFaixa = useMemo(() => {
          return faixasPresentes.map(f => {
            const rs = data.filter(r=>r.faixa===f);
            const cnt = (fn)=>rs.filter(fn).length;
            return {
              faixa: f, fase: rs[0]?.fase, n: rs.length,
              libA: cnt(r=>r.libAntigo), libR: cnt(r=>r.libRusck), libS: cnt(r=>r.libSarg),
              regrR: cnt(r=>r.libAntigo && !r.libRusck), regrS: cnt(r=>r.libAntigo && !r.libSarg),
              gainR: cnt(r=>!r.libAntigo && r.libRusck), gainS: cnt(r=>!r.libAntigo && r.libSarg),
              carA: rs.reduce((a,r)=>a+r.carregAntigo,0)/rs.length,
              carR: rs.reduce((a,r)=>a+r.carregRusck,0)/rs.length,
              carS: rs.reduce((a,r)=>a+r.carregSarg,0)/rs.length,
            };
          });
        }, [data]);

        const exportCsv = () => {
          const head = ["Potencia trafo","Fase","D (kVA)","N clientes","Dem. instalada","Classe (auto)",
            "Impacto ATUAL","Impacto RUSCK","Impacto SARGENT",
            "Carreg. antes","Carreg. atual","Carreg. Rusck","Carreg. Sargent",
            "Lib. base","Lib. Rusck","Lib. Sargent",
            "Transicao Rusck","Transicao Sargent","Margem Rusck (kVA)","Margem Sargent (kVA)"];
          const transicao = (b,nv)=> b&&!nv?"Passou a exigir obra" : !b&&nv?"Passou a liberar" : b?"Mantem liberado":"Mantem obra";
          const lines = [head.join(";")];
          for (const r of data) {
            lines.push([
              r.potTrafo, r.fase, r.D, r.nClientes, r.demInst, r.classe,
              r.impAntigo, r.impRusck, r.impSarg,
              r.carregAntes, r.carregAntigo, r.carregRusck, r.carregSarg,
              r.libAntigo?"Liberado":"Obra", r.libRusck?"Liberado":"Obra", r.libSarg?"Liberado":"Obra",
              transicao(r.libAntigo,r.libRusck), transicao(r.libAntigo,r.libSarg), r.margemRusck, r.margemSarg
            ].map(v=>typeof v==="number"?String(v).replace(".",","):v).join(";"));
          }
          const blob = new Blob(["﻿"+lines.join("\n")], {type:"text/csv;charset=utf-8;"});
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob); a.download = "comparacao_metodos.csv"; a.click();
        };

        return (
          <div className="cmp">
            <h1>Comparação de Métodos — Demanda de Impacto</h1>
            <p className="sub">
              Método atual da planilha × Rusck (CEMIG) × Sargent/Heydt · classe e coincidência
              inferidas automaticamente · limite de liberação em 150% de carregamento.
            </p>

            {!state && (
              <>
                {loading && (
                  <div className="card" style={{textAlign:"center", color:"var(--text-3)"}}>
                    Carregando <b style={{color:"var(--text-2)"}}>arquivo.xlsx</b> da raiz…
                  </div>
                )}
                {!loading && (
                  <div
                    className={"drop"+(over?" over":"")}
                    onClick={()=>fileRef.current.click()}
                    onDragOver={(e)=>{e.preventDefault(); setOver(true);}}
                    onDragLeave={()=>setOver(false)}
                    onDrop={onDrop}
                  >
                    <div className="big">Não encontrei <b>arquivo.xlsx</b> na raiz — solte a planilha aqui</div>
                    <div className="small">ou clique para escolher · .xlsx / .xls / .csv</div>
                    <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv"
                      style={{display:"none"}}
                      onChange={(e)=>{const f=e.target.files[0]; if(f) handleFile(f);}} />
                  </div>
                )}
                {err && <div className="err">⚠ {err}</div>}
                <div className="card" style={{marginTop:20}}>
                  <div className="sec-title">Colunas reconhecidas na planilha</div>
                  <div className="muted">
                    <b style={{color:"var(--text-2)"}}>D</b> (carga bruta a diversificar) ·
                    Número de clientes · Demanda instalada transformador · Potência transformador ·
                    Resultado simulação · Motivo · Demanda de impacto · Nova demanda instalada ·
                    % Carregamento · % Novo carregamento. A coluna <b style={{color:"var(--text-2)"}}>D</b> é
                    usada como carga de entrada dos métodos Rusck e Sargent/Heydt.
                  </div>
                </div>
              </>
            )}

            {state && kpis && (
              <>
                <div className="toolbar">
                  <button className="btn" onClick={()=>fileRef.current.click()}>⭱ Trocar arquivo</button>
                  <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}}
                    onChange={(e)=>{const f=e.target.files[0]; if(f) handleFile(f);}} />
                  <button className="btn primary" onClick={exportCsv}>⭳ Exportar CSV</button>
                  <span className="muted" style={{marginLeft:4}}>
                    {state.origem} · aba <b style={{color:"var(--text-2)"}}>{state.sheet}</b> · {dataAll.length} transformadores
                  </span>
                  <span style={{flex:1}}></span>
                  <select className="sel" value={faseFiltro} onChange={(e)=>{setFaseFiltro(e.target.value); setFaixaFiltro("__todas__");}}>
                    <option value="__todas__">Mono + Trifásico</option>
                    <option value="Monofásico">Monofásico</option>
                    <option value="Trifásico">Trifásico</option>
                  </select>
                  <select className="sel" value={faixaAtiva} onChange={(e)=>setFaixaFiltro(e.target.value)}>
                    <option value="__todas__">Todas as potências</option>
                    {faixasPresentes.map(f=><option key={f} value={f}>{f}</option>)}
                  </select>
                </div>

                <CmpLegend />

                <div className="sec-title" style={{marginBottom:10, display:"flex", alignItems:"center", gap:8, flexWrap:"wrap"}}>
                  Indicadores
                  {faseFiltro!=="__todas__" &&
                    <span className="pill" style={{background:"#132238", color:"var(--accent)"}}>{faseFiltro}</span>}
                  {faixaAtiva==="__todas__"
                    ? <span className="pill" style={{background:"#14243a", color:"var(--text-3)"}}>Todas as potências · {kpis.n}</span>
                    : <span className="pill" style={{background:"#14314f", color:"var(--accent)"}}>{faixaAtiva} · {kpis.n} caso{kpis.n>1?"s":""}</span>}
                </div>

                <div className="kpis">
                  <div className="kpi" style={{borderColor:(kpis.regrR||kpis.regrS)?"rgba(208,59,59,0.5)":"var(--border)"}}>
                    <div className="label">⚠ Passou a exigir obra</div>
                    <div className="val mono">
                      <span style={{color:(kpis.regrR?"var(--st-crit)":"var(--text-3)")}}>{kpis.regrR}</span>
                      <span className="unit"> / </span>
                      <span style={{color:(kpis.regrS?"var(--st-crit)":"var(--text-3)")}}>{kpis.regrS}</span>
                    </div>
                    <div className="foot">era possível liberar → agora obra · <span style={{color:"var(--s-rusck)"}}>Rusck</span> / <span style={{color:"var(--s-sarg)"}}>Sargent</span></div>
                  </div>
                  <div className="kpi">
                    <div className="label">✓ Passou a liberar</div>
                    <div className="val mono">
                      <span style={{color:(kpis.gainR?"var(--st-good)":"var(--text-3)")}}>+{kpis.gainR}</span>
                      <span className="unit"> / </span>
                      <span style={{color:(kpis.gainS?"var(--st-good)":"var(--text-3)")}}>+{kpis.gainS}</span>
                    </div>
                    <div className="foot">exigia obra → agora libera · Rusck / Sargent</div>
                  </div>
                  <div className="kpi">
                    <div className="label">Liberados sem obra</div>
                    <div className="val mono">
                      {kpis.liberadosA}<span className="unit" style={{fontSize:15}}> → {kpis.liberadosR} / {kpis.liberadosS}</span>
                    </div>
                    <div className="foot">base → Rusck / Sargent (de {kpis.n})</div>
                  </div>
                  <div className="kpi">
                    <div className="label">Divergência Rusck×Sargent</div>
                    <div className="val mono" style={{color:kpis.divergentes?"var(--st-warn)":"var(--text-3)"}}>{kpis.divergentes}</div>
                    <div className="foot">decisão de liberação difere entre os métodos</div>
                  </div>
                  <div className="kpi">
                    <div className="label">Estouram 150%</div>
                    <div className="val mono">
                      <span style={{color:(kpis.estouramR?"var(--st-crit)":"var(--text-3)")}}>{kpis.estouramR}</span>
                      <span className="unit"> / </span>
                      <span style={{color:(kpis.estouramS?"var(--st-crit)":"var(--text-3)")}}>{kpis.estouramS}</span>
                    </div>
                    <div className="foot">carreg. novo &gt; 150% · Rusck / Sargent</div>
                  </div>
                  <div className="kpi">
                    <div className="label">No limite (120–150%)</div>
                    <div className="val mono">
                      <span style={{color:(kpis.apertadosR?"var(--st-warn)":"var(--text-3)")}}>{kpis.apertadosR}</span>
                      <span className="unit"> / </span>
                      <span style={{color:(kpis.apertadosS?"var(--st-warn)":"var(--text-3)")}}>{kpis.apertadosS}</span>
                    </div>
                    <div className="foot">liberam, mas com pouca folga</div>
                  </div>
                  <div className="kpi">
                    <div className="label">Carreg. novo médio</div>
                    <div className="val mono">
                      <span style={{color:"var(--s-rusck)"}}>{cmpPct(kpis.carRmed,0)}</span>
                      <span className="unit"> / </span>
                      <span style={{color:"var(--s-sarg)"}}>{cmpPct(kpis.carSmed,0)}</span>
                    </div>
                    <div className="foot">média Rusck / Sargent · mediana Rusck {cmpPct(kpis.carRmediana,0)}</div>
                  </div>
                </div>

                <div className="card">
                  <div className="sec-title">Resumo por potência do transformador</div>
                  <div className="tbl-wrap">
                    <table>
                      <thead>
                        <tr>
                          <th>Potência</th><th>Fase</th><th>Casos</th>
                          <th>Liberados base</th><th>Lib. Rusck</th><th>Lib. Sargent</th>
                          <th title="era possível liberar → passou a exigir obra">→ Obra R/S</th>
                          <th title="exigia obra → passou a liberar">→ Libera R/S</th>
                          <th>Carreg. atual</th><th>Carreg. Rusck</th><th>Carreg. Sargent</th>
                        </tr>
                      </thead>
                      <tbody>
                        {porFaixa.map(f=>(
                          <tr key={f.faixa}>
                            <td className="mono">{f.faixa}</td>
                            <td style={{color:"var(--text-3)"}}>{f.fase}</td>
                            <td className="mono">{f.n}</td>
                            <td className="mono" style={{color:"var(--s-antigo)"}}>{f.libA}</td>
                            <td className="mono" style={{color:"var(--s-rusck)"}}>{f.libR}</td>
                            <td className="mono" style={{color:"var(--s-sarg)"}}>{f.libS}</td>
                            <td className="mono">
                              <span style={{color:f.regrR?"var(--st-crit)":"var(--text-4)"}}>{f.regrR}</span>
                              <span style={{color:"var(--text-5)"}}> / </span>
                              <span style={{color:f.regrS?"var(--st-crit)":"var(--text-4)"}}>{f.regrS}</span>
                            </td>
                            <td className="mono">
                              <span style={{color:f.gainR?"var(--st-good)":"var(--text-4)"}}>{f.gainR}</span>
                              <span style={{color:"var(--text-5)"}}> / </span>
                              <span style={{color:f.gainS?"var(--st-good)":"var(--text-4)"}}>{f.gainS}</span>
                            </td>
                            <td className="mono">{cmpPct(f.carA)}</td>
                            <td className="mono">{cmpPct(f.carR)}</td>
                            <td className="mono">{cmpPct(f.carS)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div className="foot-note">
                    <b style={{color:"var(--st-crit)"}}>→ Obra</b> = casos que a base liberava e o novo método passa a exigir obra (Rusck / Sargent).
                    <b style={{color:"var(--st-good)"}}> → Libera</b> = o contrário. Base = carregamento atual ≤ 150% (critério único: (dem. instalada + demanda de impacto) / potência).
                  </div>
                </div>

                <div className="sec-title" style={{marginTop:6}}>Carregamento médio por potência</div>
                {faixasPresentes
                  .filter(f=>faixaAtiva==="__todas__"||f===faixaAtiva)
                  .map(f=><CmpFaixaBars key={f} nome={f} rows={data.filter(r=>r.faixa===f)} />)}

                <div className="card">
                  <div className="sec-title" style={{display:"flex", alignItems:"center", gap:12, flexWrap:"wrap"}}>
                    <span>Detalhe por transformador {faixaAtiva!=="__todas__" && `— ${faixaAtiva}`}{faseFiltro!=="__todas__" && ` · ${faseFiltro}`}</span>
                    <label style={{display:"flex", alignItems:"center", gap:6, fontSize:11, fontWeight:400, textTransform:"none", letterSpacing:0, color:"var(--text-3)", cursor:"pointer"}}>
                      <input type="checkbox" checked={soRegr} onChange={(e)=>setSoRegr(e.target.checked)} />
                      só casos que passaram a exigir obra
                    </label>
                  </div>
                  <div className="tbl-wrap">
                    <table>
                      <thead>
                        <tr>
                          <th>#</th><th>D (kVA)</th><th>Clientes</th><th>Pot.</th><th>Dem. inst.</th><th>Classe (auto)</th>
                          <th>Imp. atual</th><th>Imp. Rusck</th><th>Imp. Sarg.</th>
                          <th>Carr. atual</th><th>Carr. Rusck</th><th>Carr. Sarg.</th>
                          <th>Lib. base</th><th>Lib. Rusck</th><th>Lib. Sarg.</th>
                        </tr>
                      </thead>
                      <tbody>
                        {visiveis
                          .filter(r=> !soRegr || (r.libAntigo && (!r.libRusck || !r.libSarg)))
                          .map((r,i)=>{
                          const regr = r.libAntigo && (!r.libRusck || !r.libSarg);
                          return (
                          <tr key={i} style={regr?{boxShadow:"inset 3px 0 0 var(--st-crit)"}:null}>
                            <td className="mono">{i+1}</td>
                            <td className="mono" style={{color:"var(--text)"}}>{cmpFmt(r.D)}</td>
                            <td className="mono">{r.nClientes}</td>
                            <td className="mono">{cmpFmt(r.potTrafo,0)}</td>
                            <td className="mono">{cmpFmt(r.demInst)}</td>
                            <td style={{color:"var(--text-3)"}}>{r.classe}</td>
                            <td className="mono" style={{color:"var(--s-antigo)"}}>{cmpFmt(r.impAntigo)}</td>
                            <td className="mono" style={{color:"var(--s-rusck)"}}>{cmpFmt(r.impRusck)}</td>
                            <td className="mono" style={{color:"var(--s-sarg)"}}>{cmpFmt(r.impSarg)}</td>
                            <td className="mono">{cmpPct(r.carregAntigo)}</td>
                            <td className="mono">{cmpPct(r.carregRusck)}</td>
                            <td className="mono">{cmpPct(r.carregSarg)}</td>
                            <td><CmpLibPill ok={r.libAntigo} /></td>
                            <td><CmpLibPill ok={r.libRusck} /></td>
                            <td><CmpLibPill ok={r.libSarg} /></td>
                          </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                  <div className="foot-note">
                    Linhas com <span style={{color:"var(--st-crit)"}}>│</span> à esquerda = liberavam na base e passam a exigir obra em algum método novo.
                    Impacto Rusck/Sargent = DD = D · FU(classe) · fc(n), com <b>D = coluna "D"</b>, n = clientes existentes + 1, classe inferida por D.
                    Carregamento = (dem. instalada + impacto) / potência.
                  </div>
                </div>
              </>
            )}
          </div>
        );
      }

      // ============================================================
      // APP PRINCIPAL COM ABAS
      // ============================================================
      function App() {
        const [tab, setTab] = useState("calc");

        // Ao mudar para documentação, scroll para o topo
        useEffect(() => {
          window.scrollTo({ top: 0, behavior: "instant" });
        }, [tab]);

        return (
          <>
            <nav className="top-nav">
              <div className="top-nav-inner">
                <button
                  className={"nav-tab " + (tab === "calc" ? "active" : "")}
                  onClick={() => setTab("calc")}
                >
                  <span className="tab-num">01</span>Calculadora
                </button>
                <button
                  className={"nav-tab " + (tab === "cmp" ? "active" : "")}
                  onClick={() => setTab("cmp")}
                >
                  <span className="tab-num">02</span>Comparação
                </button>
                <button
                  className={"nav-tab " + (tab === "doc" ? "active" : "")}
                  onClick={() => setTab("doc")}
                >
                  <span className="tab-num">03</span>Documentação
                </button>
              </div>
            </nav>
            {tab === "calc" ? <Calculadora /> : tab === "cmp" ? <Comparacao /> : <Documentacao />}
          </>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);

      // Esconder loader após primeiro render
      requestAnimationFrame(() => {
        setTimeout(() => {
          document.getElementById("loader").classList.add("hidden");
        }, 100);
      });
    </script>
  </body>
</html>
